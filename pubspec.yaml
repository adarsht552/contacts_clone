name: contacts_app
description: A Google Contacts-like Flutter application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_staggered_animations: ^1.1.1
  cached_network_image: ^3.3.1
  dynamic_color: ^1.6.0

  # Calling
  url_launcher: ^6.2.6

  # Image picking
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Utilities
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  uuid: ^4.4.0
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
